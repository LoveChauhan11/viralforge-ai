name: viralforge-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: viralforge-postgres
    environment:
      POSTGRES_USER: viralforge
      POSTGRES_PASSWORD: viralforge
      POSTGRES_DB: viralforge
    ports:
      - "5432:5432"
    volumes:
      - viralforge_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viralforge -d viralforge"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: viralforge-redis
    ports:
      - "6379:6379"
    volumes:
      - viralforge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: viralforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - viralforge_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: viralforge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/viralforge-local &&
      exit 0
      "

volumes:
  viralforge_pg_data:
  viralforge_redis_data:
  viralforge_minio_data:
